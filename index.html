<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="/socket.io/socket.io.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Songho Online - Jeu à distance</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajout pour le bouton de téléchargement APK */
        .apk-download {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-family: Arial, sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .apk-download:hover {
            transform: scale(1.05);
        }
        .apk-download img, .apk-download:before {
            content: "📱";
            font-size: 20px;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <h1>🎲 SONGHO - MULTIJOUEUR</h1>
        <div class="room-info">
            <input type="text" id="roomCode" placeholder="Code de partie (6 chiffres)" maxlength="6">
            <button id="joinRoomBtn">🔗 Rejoindre</button>
            <button id="createRoomBtn">✨ Créer partie</button>
        </div>
        <div id="roomStatus" class="room-status">Aucune partie</div>
    </div>

    <div class="board-container">
        <div class="board">
            <!-- Joueur Nord (JOUEUR 1 - haut) -->
            <div class="player-zone player-north">
                <div class="player-header">
                    <span class="player-name" id="northPlayerName">JOUEUR 1 (haut)</span>
                    <span class="player-score" id="score-north">0</span>
                </div>
                <div class="case-row" id="north-row"></div>
            </div>

            <!-- Joueur Sud (JOUEUR 2 - bas) -->
            <div class="player-zone player-south">
                <div class="player-header">
                    <span class="player-name" id="southPlayerName">JOUEUR 2 (bas)</span>
                    <span class="player-score" id="score-south">0</span>
                </div>
                <div class="case-row" id="south-row"></div>
            </div>
        </div>

        <div class="game-info">
            <div class="turn-indicator" id="turn-text">En attente...</div>
            <div class="message-area" id="game-message">Créez ou rejoignez une partie</div>
            <button id="resetBtn" disabled>🔄 Nouvelle partie</button>
            <button id="quitBtn" disabled>🚪 Quitter</button>
        </div>
    </div>
</div>

<!-- BOUTON DE TÉLÉCHARGEMENT APK -->
<a href="/songho.apk" download class="apk-download">
    📱 Télécharger l'APK Songho
</a>

<script src="script.js"></script>
</body>
</html>
